name: Bug report
description: Report a reproducible problem
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide enough detail for us to reproduce it.
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: One-sentence description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Use workflow ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Shell:
        Python:
        Install method:
        AI CLI(s):
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / traceback
      render: shell
