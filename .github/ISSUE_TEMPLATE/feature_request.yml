name: Feature request
description: Suggest an improvement or new capability
title: "[feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please explain the user problem first.
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      placeholder: What are you trying to do that is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the behavior or UX you want
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      placeholder: Links, examples, prior art, screenshots, etc.
