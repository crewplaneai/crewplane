settings:
  # Experimental workspace isolation feature is disabled by default. With enabled:
  # false, providers run in the project root and non-Git projects work normally.
  #
  # Managed workspaces require settings.workspace.enabled: true, workflow-level
  # worktrees declarations, and a supported Git repository. Initial support:
  # - Clean ordinary Git repository: yes
  # - Non-Git project: no; keep enabled: false
  # - Git LFS or custom filters: no; disable workspace isolation for that run
  # - text/eol/crlf conversion: no; disable isolation or remove the attribute
  # - Submodules, sparse clone, partial clone: no; use disabled mode or full clone
  # - Ordinary ignored caches: yes; use setup profiles or snapshot workspaces
  workspace:
    enabled: false
    cache_root: null
    cleanup_on_success: true
    # blob_exact requires provider-visible file bytes to match Git blob bytes.
    # It rejects Git LFS, custom filters, and text/eol/encoding transforms.
    worktree_contract: "blob_exact"
    clean_start: "strict" # strict | tracked_only
    # Optional audited setup commands selected by workflow worktrees:
    # setup_profiles:
    #   node_dependencies:
    #     run:
    #       - ["uv", "sync"]
    setup_profiles: {}
    setup_timeout_seconds: 600
    identity:
      include_cache_root: false
    max_concurrent_materializations: 1
    # Disk guardrails compare estimated remaining cache filesystem bytes after
    # checkout materialization against these optional thresholds.
    disk:
      warn_free_bytes: null
      fail_free_bytes: null
  log_level: "info"
  sequential_consensus_on_exhaustion: "continue" # continue | fatal
  max_audit_rounds: 5 # max allowed value for sequential review nodes using audit_rounds
  token_budget:
    warn_threshold_chars: 50000
    fail_threshold_chars: null # optional fail-fast guard for artifact and review-loop context injections
  integrations:
    invoker:
      # First run: deterministic mock output, no provider CLI required.
      #
      # Real provider runs:
      # implementation: "cli"
      # options: {}
      #
      # Mock invoker for the first provider-free run. Comment out this
      # implementation/options block and uncomment the real provider lines above
      # when you are ready to run external provider CLIs.
      implementation: "mock"
      options:
        output_mode: "lorem"
        seed: 42
        delay_seconds: 0.25
        observation_delay_seconds: 5
    ui:
      implementation: "tmux"
      options:
        auto_close_session: true
        quiet_after_seconds: 120.0 # show extra liveness copy after this many quiet seconds
        # log_tail_lines: 40 # optional fixed cap; omit or set null to fit the right pane height
    artifacts:
      implementation: "filesystem"
      options:
        log_cli_output: true
        allowed_template_paths: []

# Real provider runs start the external commands configured in .crewplane/config.yml.
# Those tools run with their own filesystem, network, credential, approval, and
# sandbox settings. Crewplane coordinates them and records artifacts; it does not
# sandbox them.
